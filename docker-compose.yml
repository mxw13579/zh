services:
  openai-format-adapter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openai-format-adapter
    restart: unless-stopped
    environment:
      ADAPTER_AUTHORIZATION: ${ADAPTER_AUTHORIZATION}
      ALLOW_ORIGIN: ${ALLOW_ORIGIN:-*}
      REASONING_STRATEGY: ${REASONING_STRATEGY:-as_reasoning_content}
      PORT: 8787
    ports:
      - ${HOST_PORT:-8787}:8787
